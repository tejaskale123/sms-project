{% extends 'base.html' %}
{% block content %}
<section class="page-section">
    <div class="section-header">
        <div>
            <h1>Add Student</h1>
            <p class="section-subtitle">Create a new student record in the database.</p>
        </div>
        <a class="btn btn-secondary" href="/students/">Back to list</a>
    </div>

    <div class="card card-form">
        <form method="POST" class="form">
            {% csrf_token %}
            <div class="form-row">
                <label>Name</label>
                <input class="form-control" type="text" name="name" placeholder="Name" required>
            </div>
            <div class="form-row">
                <label>Roll Number</label>
                <input class="form-control" type="text" name="roll" placeholder="Roll" required>
            </div>
            <div class="form-row">
                <label>Email</label>
                <input class="form-control" type="email" name="email" placeholder="Email" required>
            </div>
            <div class="form-row">
                <label>Department</label>
                <input class="form-control" type="text" name="department" placeholder="Department" required>
            </div>
            <button class="btn btn-primary" type="submit">Save Student</button>
        </form>
    </div>
</section>
{% endblock %}
