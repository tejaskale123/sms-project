{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <div>
        <h2>Subjects</h2>
        <p>Manage the subjects available for attendance and reports.</p>
    </div>
    <a href="/subjects/add/" class="btn">+ Add Subject</a>
</div>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Code</th>
                <th class="text-right">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for s in subjects %}
            <tr>
                <td>{{ s.name }}</td>
                <td>{{ s.code }}</td>
                <td class="text-right">
                    <a class="link-action link-action-danger" href="/subjects/delete/{{ s.id }}/">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="empty-state">No subjects found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
