{% extends 'base.html' %}

{% block content %}
<section class="page-section login-section">
    <div class="card card-form login-card">
        <h1>Sign In</h1>
        <p class="section-subtitle">Enter your credentials to access EduTrack Pro.</p>

        <form method="POST" class="form">
            {% csrf_token %}
            <div class="form-row">
                <label>Username</label>
                <input class="form-control" type="text" name="username" placeholder="Username" required>
            </div>
            <div class="form-row">
                <label>Password</label>
                <div class="password-wrapper">
                    <input class="form-control" type="password" name="password" placeholder="Password" required id="password">
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="eye-icon">👁️</i>
                    </span>
                </div>
            </div>
            <button class="btn btn-primary" type="submit">Login</button>
        </form>

        {% if error %}
        <p class="form-error">{{ error }}</p>
        {% endif %}
    </div>
</section>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.querySelector('.eye-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
    } else {
        input.type = 'password';
        icon.textContent = '👁️';
    }
}
</script>
{% endblock %}
